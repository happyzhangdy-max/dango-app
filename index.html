<style>
/* ===== Design Tokens (е§Циѓ≠пњ?v3.0) ===== */
:root {
  /* === Dark Surface (4-level) === */
  --bg-primary: #0a0a12;
  --bg-surface: #12121e;
  --bg-surface-2: #1a1a2e;
  --bg-surface-3: #222238;
  --bg-hover: rgba(255,255,255,0.04);
  --bg-active: rgba(245,158,11,0.08);

  /* === Brand Colors === */
  --amber: #f59e0b;
  --amber-light: rgba(245,158,11,0.15);
  --coral: #e94560;
  --coral-light: rgba(233,69,96,0.15);
  --purple: #a855f7;
  --purple-light: rgba(168,85,247,0.15);
  --teal: #4ecca3;
  --teal-light: rgba(78,204,163,0.15);
  --navy: #0f3460;

  /* === Text === */
  --text-primary: #fafafa;
  --text-secondary: rgba(255,255,255,0.7);
  --text-tertiary: rgba(255,255,255,0.45);
  --text-quaternary: rgba(255,255,255,0.25);

  /* === Borders === */
  --border-subtle: rgba(255,255,255,0.06);
  --border-hover: rgba(245,158,11,0.2);
  --border-active: rgba(245,158,11,0.4);

  /* === Typography === */
  --font-jp: 'Noto Sans JP', sans-serif;
  --font-sc: 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
  --font-en: 'Inter', 'Segoe UI', sans-serif;

  --fs-display: 32px;
  --fs-h1: 24px;
  --fs-h2: 20px;
  --fs-body: 16px;
  --fs-caption: 14px;
  --fs-small: 12px;
  --fs-tiny: 11px;

  --fw-black: 900;
  --fw-bold: 700;
  --fw-medium: 500;
  --fw-regular: 400;

  --lh-tight: 1.2;
  --lh-normal: 1.5;
  --lh-loose: 1.8;

  /* === Spacing (4px grid) === */
  --sp-1: 4px;
  --sp-2: 8px;
  --sp-3: 12px;
  --sp-4: 16px;
  --sp-5: 20px;
  --sp-6: 24px;
  --sp-8: 32px;
  --sp-10: 40px;
  --sp-12: 48px;

  /* === Radius === */
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --radius-xl: 20px;
  --radius-full: 9999px;

  /* === Shadows === */
  --shadow-card: 0 4px 20px rgba(0,0,0,0.25);
  --shadow-elevated: 0 8px 32px rgba(0,0,0,0.35);
  --shadow-glow-amber: 0 0 20px rgba(245,158,11,0.15);
  --shadow-glow-coral: 0 0 20px rgba(233,69,96,0.15);

  /* === Transitions === */
  --tr-normal: 0.25s ease;

  /* === Nav === */
  --nav-height: 68px;
  --topbar-h: 48px;
  --sidebar-w: 260px;
}

* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:var(--font-sc); background:var(--bg-primary); color:var(--text-primary); min-height:100vh; position:relative; scroll-padding-top:52px; }
body::before { content:''; position:fixed; inset:0; background:url('bg.jpg') center top/cover no-repeat; opacity:0.55; z-index:0; pointer-events:none; }
/* вФАвФА ж∞ЫеЫіеЕЙжЩХз≥їзїЯпЉИйЗНпњ?v2пњ?вФАвФАвФАвФАвФАвФАвФАвФАвФАвФА */
.ambient-glow { position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
.ambient-glow .glow { position:absolute; width:500px; height:500px; border-radius:50%; filter:blur(120px); opacity:0.25; will-change:transform; }
.ambient-glow .glow-1 { top:-120px; right:-80px; background:radial-gradient(circle, rgba(245,158,11,0.3) 0%, transparent 70%); width:600px; height:600px; opacity:0.2; }
.ambient-glow .glow-2 { bottom:-100px; left:-100px; background:radial-gradient(circle, rgba(233,69,96,0.2) 0%, transparent 70%); width:450px; height:450px; opacity:0.15; }
.ambient-glow .glow-3 { bottom:-60px; right:-40px; background:radial-gradient(circle, rgba(168,85,247,0.2) 0%, transparent 70%); width:400px; height:400px; opacity:0.12; }

body::after { display:none; } /* жЧІoverlayжЛЖйЩ§пЉМзФ±ambient-glowжЫњдї£ */
.main,.nav { position:relative; z-index:1; }

/* вФАвФА Hero еЃєеЩ® вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА */
.hero { position:relative; width:calc(100% + 32px); margin-left:-16px; margin-bottom:18px; height:160px; overflow:hidden; padding-top:0; display:flex; align-items:center; justify-content:center; }
.hero::before { content:''; position:absolute; inset:0; }
.hero::after { content:''; position:absolute; inset:0; background:linear-gradient(180deg, transparent 40%, var(--bg-primary) 100%); z-index:1; }

/* Hero еЖЕеЃєпњ?*/
.hero-content { position:relative; z-index:2; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:0 24px; width:100%; }
.hero-badge { display:inline-flex; align-items:center; gap:4px; background:rgba(245,158,11,0.12); border:1px solid rgba(245,158,11,0.2); border-radius:var(--radius-full); padding:3px 10px 3px 8px; margin-bottom:8px; backdrop-filter:blur(4px); }
.hero-badge-icon { font-size:14px; }
.hero-badge-text { font-size:10px; font-weight:600; color:var(--amber); letter-spacing:0.5px; }
.hero-title { font-family:var(--font-jp); font-size:28px; font-weight:900; background:linear-gradient(135deg, #fafafa 0%, var(--amber) 50%, var(--coral) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; letter-spacing:3px; margin-bottom:4px; line-height:1.3; }
.hero-tagline { font-size:12px; color:rgba(255,255,255,0.55); letter-spacing:1px; margin-bottom:12px; font-weight:400; }
.hero-actions { display:flex; gap:8px; }
.hero-cta { display:inline-flex; align-items:center; justify-content:center; padding:8px 20px; border-radius:var(--radius-full); font-size:13px; font-weight:700; cursor:pointer; border:none; transition:transform 0.2s, box-shadow 0.2s, opacity 0.2s; -webkit-tap-highlight-color:transparent; }
.hero-cta:hover { transform:translateY(-1px); }
.hero-cta:active { transform:scale(0.96); }
.hero-cta-primary { background:linear-gradient(135deg, var(--amber) 0%, var(--coral) 100%); color:#fff; box-shadow:0 4px 16px rgba(233,69,96,0.25); }
.hero-cta-primary:hover { box-shadow:0 6px 20px rgba(233,69,96,0.35); }
.hero-cta-secondary { background:rgba(255,255,255,0.06); color:var(--text-secondary); border:1px solid rgba(255,255,255,0.1); backdrop-filter:blur(4px); }
.hero-cta-secondary:hover { background:rgba(255,255,255,0.1); color:var(--text-primary); }

/* вФАвФА жЦ∞зФ®жИЈеЉХеѓЉж®™пњ?вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА */
.onboarding-banner { position:relative; background:linear-gradient(135deg, rgba(168,85,247,0.08) 0%, rgba(245,158,11,0.08) 100%); border:1px solid rgba(168,85,247,0.15); border-radius:var(--radius-md); padding:10px 14px; margin-bottom:14px; display:flex; align-items:center; gap:10px; animation:fadeSlideIn 0.5s ease; cursor:pointer; }
.onboarding-banner.hidden { display:none; }
@keyframes pulseGlow { 0%,100%{opacity:0.6} 50%{opacity:1} }
@keyframes fadeSlideIn { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }
.onboarding-icon { font-size:20px; flex-shrink:0; }
.onboarding-text { flex:1; font-size:12px; color:var(--text-secondary); line-height:1.5; }
.onboarding-text strong { color:var(--amber); }
.onboarding-close { flex-shrink:0; width:22px; height:22px; border-radius:50%; background:rgba(255,255,255,0.06); border:none; color:var(--text-tertiary); font-size:12px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background 0.2s, color 0.2s; }
.onboarding-close:hover { background:rgba(255,255,255,0.12); color:var(--text-primary); }

.vwb { display:block; background:linear-gradient(135deg,#1a1a3e,#0f3460); border:1px solid rgba(168,85,247,0.3); border-radius:14px; padding:28px 20px; margin-bottom:16px; cursor:pointer; text-align:center; transition:opacity 0.3s,transform 0.3s,background 0.3s,border-color 0.3s; position:relative; overflow:hidden; }
.vwb:hover { border-color:#a855f7; transform:translateY(-2px); box-shadow:0 8px 30px rgba(168,85,247,0.2); }
.vwb::after { content:''; position:absolute; top:-50%; right:-50%; width:100%; height:200%; background:linear-gradient(45deg,transparent 40%,rgba(168,85,247,0.05) 50%,transparent 60%); transition:opacity 0.6s,transform 0.6s,background 0.6s; }
.vwb:hover::after { transform:translateX(30px); }
.vwb-icon { font-size:36px; display:block; margin-bottom:6px; }
.vwb-title { font-size:20px; font-weight:800; background:linear-gradient(135deg,#e94560,#a855f7); -webkit-background-clip:text; -webkit-text-fill-color:transparent; letter-spacing:2px; }
.vwb-sub { font-size:12px; color:#888; margin-top:6px; letter-spacing:1px; }

/* ===== й¶Цй°µ ¬Ј еЫЫеРСиКВе•П v2 ===== */
/* еУБзЙМж†ЗйҐШпњ?*/
.brand-section { padding:64px 0 56px; text-align:center; position:relative; }
.brand-title {
  font-family:var(--font-jp); font-size:44px; font-weight:900;
  background:linear-gradient(135deg,#fafafa 0%,var(--amber) 40%,var(--coral) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  letter-spacing:6px; line-height:1.2; margin-bottom:12px;
}
.brand-subtitle { font-size:15px; color:var(--text-tertiary); letter-spacing:4px; font-weight:400; }

/* йЭЮеѓєпњ?pair еН°зЙЗ пњ?зОїзТГиі®жДЯйЗНиЃЊпњ?*/
.pair-section { display:flex; gap:14px; margin-bottom:16px; }
.pair-card {
  flex:1; display:flex; align-items:center; gap:14px;
  background:linear-gradient(135deg, rgba(18,18,30,0.55), rgba(18,18,30,0.3));
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(168,85,247,0.25);
  border-radius:var(--radius-lg); padding:20px 18px;
  cursor:pointer; transition:all var(--tr-normal);
  position:relative; overflow:hidden;
  box-shadow:0 4px 24px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.04);
}
.pair-card::before {
  content:''; position:absolute;
  top:-50%; right:-20%;
  width:200px; height:200px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(168,85,247,0.06), transparent 70%);
  pointer-events:none;
  transition:all 0.5s ease;
}
.pair-card:hover { transform:translateY(-3px); }
.pair-card:hover::before { opacity:0.7; transform:scale(1.2); }
/* рЯУЄ жЙЂжППпњ?пњ?зіЂвЖТзПКзСЪжЄРеПШ */
.pair-card-scan { transform:translateX(-6px) translateY(4px); border-color:rgba(233,69,96,0.3); }
.pair-card-scan::after {
  content:''; position:absolute; inset:0; pointer-events:none; border-radius:inherit;
  background:linear-gradient(135deg, rgba(233,69,96,0.08), transparent 50%);
}
.pair-card-scan:hover { border-color:var(--coral); box-shadow:0 8px 32px rgba(233,69,96,0.18), 0 4px 24px rgba(0,0,0,0.3); }
.pair-card-scan:hover::after { background:linear-gradient(135deg, rgba(233,69,96,0.12), transparent 50%); }
/* рЯУЪ иЗ™еК®иГМеНХиѓНеН° пњ?зіЂвЖТзР•зПАжЄРеПШ */
.pair-card-autoplay { transform:translateX(6px) translateY(-4px); border-color:rgba(245,158,11,0.3); }
.pair-card-autoplay::after {
  content:''; position:absolute; inset:0; pointer-events:none; border-radius:inherit;
  background:linear-gradient(135deg, rgba(245,158,11,0.08), transparent 50%);
}
.pair-card-autoplay:hover { border-color:var(--amber); box-shadow:0 8px 32px rgba(245,158,11,0.18), 0 4px 24px rgba(0,0,0,0.3); }
.pair-card-autoplay:hover::after { background:linear-gradient(135deg, rgba(245,158,11,0.12), transparent 50%); }
.pair-card-icon { font-size:32px; flex-shrink:0; line-height:1; }
.pair-card-text { flex:1; min-width:0; }
.pair-card-title { font-size:17px; font-weight:800; color:var(--text-primary); letter-spacing:1px; margin-bottom:3px; }
.pair-card-sub { font-size:11px; color:var(--text-tertiary); letter-spacing:0.5px; line-height:1.4; }
.pair-badge { font-size:9px; color:var(--coral); font-weight:700; vertical-align:super; margin-left:2px; }
.pair-card-arrow { font-size:16px; color:var(--text-quaternary); flex-shrink:0; transition:transform 0.3s ease; }
.pair-card:hover .pair-card-arrow { transform:translateX(4px); }

/* жЄЄжИПеЃљеМЇ пњ?зОїзТГиі®жДЯ + зіЂзПАеЕЙжЩХ */
.game-wide {
  position:relative; border-radius:var(--radius-lg); overflow:hidden; cursor:pointer;
  background:linear-gradient(135deg, rgba(18,18,30,0.5), rgba(18,18,30,0.25));
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(168,85,247,0.25);
  transition:all var(--tr-normal); margin-top:8px;
  box-shadow:0 4px 24px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.04);
}
.game-wide:hover { border-color:rgba(168,85,247,0.5); transform:translateY(-3px); box-shadow:0 8px 32px rgba(168,85,247,0.22), 0 4px 24px rgba(0,0,0,0.3); }
.game-wide-bg {
  position:absolute; inset:0; pointer-events:none;
  background:
    radial-gradient(ellipse at 80% 40%, rgba(168,85,247,0.10) 0%, transparent 60%),
    radial-gradient(ellipse at 20% 60%, rgba(245,158,11,0.07) 0%, transparent 60%),
    radial-gradient(ellipse at 50% 100%, rgba(233,69,96,0.04) 0%, transparent 50%);
}
.game-wide-content { position:relative; z-index:1; display:flex; align-items:center; gap:16px; padding:24px 22px; }
.game-wide-icon { font-size:38px; flex-shrink:0; line-height:1; }
.game-wide-info { flex:1; min-width:0; }
.game-wide-title { font-size:20px; font-weight:800; color:var(--text-primary); letter-spacing:2px; margin-bottom:4px; }
.game-wide-sub { font-size:12px; color:var(--text-tertiary); letter-spacing:0.5px; }
.game-wide-chips { display:flex; gap:8px; flex-shrink:0; }
.game-chip {
  display:inline-flex; align-items:center; gap:4px;
  padding:5px 12px; border-radius:var(--radius-full);
  font-size:10px; font-weight:700; letter-spacing:0.5px; white-space:nowrap;
}
.game-chip-challenge { background:rgba(78,204,163,0.12); color:var(--teal); border:1px solid rgba(78,204,163,0.25); }
.game-chip-rank { background:rgba(245,158,11,0.12); color:var(--amber); border:1px solid rgba(245,158,11,0.25); }
.game-wide-arrow { font-size:20px; color:var(--text-quaternary); flex-shrink:0; transition:transform 0.3s ease; }
.game-wide:hover .game-wide-arrow { transform:translateX(6px); }

/* еУНеЇФеЉПи∞Гпњ?*/
@media(max-width:600px){
  .brand-section { padding:48px 0 40px; }
  .brand-title { font-size:34px; letter-spacing:4px; }
  .brand-subtitle { font-size:13px; letter-spacing:3px; }
  .pair-section { flex-direction:column; gap:12px; }
  .pair-card { transform:none !important; padding:16px 14px; }
  .pair-card-scan, .pair-card-autoplay { transform:none !important; }
  .game-wide-content { padding:18px 16px; flex-wrap:wrap; }
  .game-wide-chips { width:100%; padding-left:54px; }
}

.nav-more { display:none; position:absolute; top:100%; right:0; background:rgba(26,26,46,0.97); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.1); border-radius:10px; padding:6px; z-index:200; min-width:160px; box-shadow:0 8px 30px rgba(0,0,0,0.4); }
.nav-more.show { display:block; }
.nav-more-item { display:block; width:100%; text-align:left; background:none !important; border:none !important; color:#aaa !important; padding:8px 14px !important; font-size:13px !important; margin:2px 0 !important; border-radius:8px !important; }
.nav-more-item:hover { background:rgba(168,85,247,0.15) !important; color:#eaeaea !important; }





.tab { padding:5px 12px; border-radius:6px; cursor:pointer; font-size:12px; color:#888; border:none; background:transparent; transition:0.2s; white-space:nowrap; flex-shrink:0; }
.tab:hover { color:#eaeaea; }
.tab.active { color:#eaeaea; background:#0f3460; }

/* ===== жЄЄжИПж®°еЭЧ ===== */
#p-game { display:none; flex-direction:column; height:1px; min-height:calc(100vh - 52px - 62px); overflow:hidden; background:#0a0a18; }
#p-game.active { display:flex; }
#gh-world { flex:1; min-height:200px; position:relative; }
#gh-quiz { flex-shrink:0; }
.game-opt-btn:active { transform:scale(0.95) !important; background:rgba(168,85,247,0.15) !important; border-color:#a855f7 !important; }
.game-opt-btn { -webkit-tap-highlight-color:transparent; user-select:none; }

/* жЄЄжИПж†ЄењГеК®зФї */
@keyframes screenShake {
  0% { transform:translateX(0) }
  20% { transform:translateX(-5px) }
  40% { transform:translateX(5px) }
  60% { transform:translateX(-4px) }
  80% { transform:translateX(3px) }
  100% { transform:translateX(0) }
}
@keyframes shake {
  0%,100% { transform:translateX(0) }
  20% { transform:translateX(-5px) }
  40% { transform:translateX(5px) }
  60% { transform:translateX(-4px) }
  80% { transform:translateX(4px) }
}
@keyframes fadeIn {
  from { opacity:0 } to { opacity:1 }
}
@keyframes bounceIn {
  0% { transform:scale(0.3); opacity:0 }
  50% { transform:scale(1.15) }
  70% { transform:scale(0.9) }
  100% { transform:scale(1); opacity:1 }
}
@keyframes slideUp {
  from { transform:translateY(20px); opacity:0 }
  to { transform:translateY(0); opacity:1 }
}
@keyframes pulse {
  0%,100% { opacity:1 }
  50% { opacity:0.5 }
}
@keyframes twinkle {
  0% { opacity:0.3 } 100% { opacity:1 }
}
@keyframes floatTextUp {0%{opacity:1;transform:translate(-50%,-50%) scale(0.5)}30%{opacity:1;transform:translate(-50%,-60%) scale(1.2)}60%{opacity:0.8;transform:translate(-50%,-80%) scale(1)}100%{opacity:0;transform:translate(-50%,-120%) scale(0.8)} }
@keyframes comboPop {
  0% { transform:translateX(-50%) scale(0.5); opacity:0 }
  50% { transform:translateX(-50%) scale(1.3) }
  100% { transform:translateX(-50%) scale(1); opacity:1 }
}
.main { max-width:960px; margin:0 auto; padding:16px; }
.page { display:none; max-width:960px; margin:0 auto; padding:16px; }
.page.active { display:block; }
@media(max-width:600px){ .page,.main{ padding:12px; padding-top:60px; } .tab{ font-size:11px; padding:4px 10px; } .vwb{ padding:20px 14px; } .hero{ height:160px; } }
.stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:8px; margin-bottom:16px; }
.sc { background:linear-gradient(135deg,#1a1a3e,#16213e); border:1px solid rgba(168,85,247,0.2); border-radius:10px; padding:14px; text-align:center; cursor:pointer; transition:opacity 0.2s,transform 0.2s,background 0.2s,border-color 0.2s; }
.sc:hover { border-color:rgba(168,85,247,0.5); transform:translateY(-2px); box-shadow:0 4px 15px rgba(0,0,0,0.2); }
.sn { font-size:22px; font-weight:700; color:#a78bfa; }
.sl { font-size:11px; color:#999; margin-top:3px; }
.h-entries { display:grid; grid-template-columns:repeat(6,1fr); gap:10px; margin-bottom:16px; }
.h-entry { background:linear-gradient(135deg,#1a1a3e,#0f3460); border:1px solid rgba(168,85,247,0.3); border-radius:14px; padding:24px 14px; cursor:pointer; text-align:center; transition:opacity 0.3s,transform 0.3s,background 0.3s,border-color 0.3s; position:relative; overflow:hidden; }
.h-entry:hover { transform:translateY(-3px); box-shadow:0 8px 30px rgba(168,85,247,0.2); }
.h-entry .h-icon { position:relative; z-index:1; }

/* вХРвХРпњ?Top Bar (simplified) вХРвХРпњ?*/
.topbar {
  position: sticky; top: 0; z-index: 100;
  height: 52px;
  background: rgba(10,10,18,0.88);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border-subtle);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
}
.topbar__logo { display: flex; flex-direction: column; line-height: 1.2; flex-shrink: 0; }
.topbar__main {
  font-size: 15px; font-weight: 800;
  background: linear-gradient(135deg, var(--amber), var(--coral));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 1px;
}
.topbar__sub { font-size: 10px; color: var(--text-tertiary); letter-spacing: 2px; font-weight: 500; }
.topbar__title {
  font-size: var(--fs-small); color: var(--text-secondary);
  font-weight: var(--fw-medium); margin-left: auto;
  opacity: 0; transition: opacity var(--tr-normal);
}
.topbar__title.show { opacity: 1; }

/* вХРвХРпњ?Bottom Navigation Bar вХРвХРпњ?*/
.bottombar {
  --nav-h: 62px;
  position: fixed; bottom: 0; left: 0; right: 0;
  height: var(--nav-h); z-index: 200;
  background: linear-gradient(180deg, rgba(10,10,18,0.94) 0%, var(--bg-surface) 100%);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-top: 1px solid var(--border-subtle);
  display: flex;
  align-items: stretch;
  justify-content: space-around;
  padding-bottom: env(safe-area-inset-bottom, 0);
}
.bottombar__item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  padding: 4px 0 2px;
  cursor: pointer;
  border: none;
  background: transparent;
  color: var(--text-tertiary);
  font-family: var(--font-sc);
  font-size: 10px;
  font-weight: 500;
  position: relative;
  transition: color 0.25s ease;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.bottombar__item:hover { color: var(--text-secondary); }
.bottombar__item--active {
  color: var(--amber);
}
.bottombar__item--active::after {
  content: '';
  position: absolute;
  top: -1px;
  left: 50%;
  transform: translateX(-50%);
  width: 28px;
  height: 2.5px;
  background: linear-gradient(90deg, var(--amber), var(--coral));
  border-radius: 0 0 3px 3px;
}
.bottombar__icon {
  font-size: 20px;
  line-height: 1;
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.bottombar__item:hover .bottombar__icon { transform: translateY(-1px); }
.bottombar__item--active .bottombar__icon { transform: translateY(-1px); }
.bottombar__label { line-height: 1; font-size: 10px; letter-spacing: 0.3px; }

/* вХРвХРпњ?Submenu Overlay Panels вХРвХРпњ?*/

/* вХРвХРпњ?Word Card (Glassmorphism) вХРвХРпњ?*/
.vc {
  position: relative;
  padding: 18px 20px;
  border-radius: var(--radius-md);
  background: linear-gradient(135deg, rgba(18,18,30,0.65), rgba(18,18,30,0.45));
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--border-subtle);
  box-shadow: var(--shadow-card);
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  cursor: pointer;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px 12px;
  overflow: hidden;
  /* allow absolute positioned elements */
}
.vc::before {
  content: '';
  position: absolute;
  top: -60%; right: -20%;
  width: 160px; height: 160px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(168,85,247,0.04), transparent 70%);
  pointer-events: none;
  transition: all 0.5s ease;
}
.vc:hover {
  transform: translateY(-3px);
  border-color: var(--border-hover);
  box-shadow: var(--shadow-elevated), 0 0 24px rgba(245,158,11,0.06);
}
.vc:hover::before {
  opacity: 0.6;
  transform: scale(1.2);
}

/* Level tag */
.vc .vl,
.vc .vt .vl {
  display: inline-flex;
  align-items: center;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.5px;
  padding: 3px 9px;
  border-radius: 4px;
  font-family: var(--font-en);
  order: 0;
  flex-shrink: 0;
}
.vc .vl.l3,
.vc .vt .vl.l3 { background: var(--teal-light); color: var(--teal); border: 1px solid rgba(78,204,163,0.2); }
.vc .vl.l2,
.vc .vt .vl.l2 { background: var(--amber-light); color: var(--amber); border: 1px solid rgba(245,158,11,0.2); }
.vc .vl.l1,
.vc .vt .vl.l1 { background: linear-gradient(135deg, rgba(245,158,11,0.12), rgba(233,69,96,0.12)); color: var(--coral); border: 1px solid rgba(233,69,96,0.2); }

/* Frequency badge */
.vc .vb-freq {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 4px;
  background: rgba(255,255,255,0.04);
  color: var(--text-tertiary);
  flex-shrink: 0;
  order: 1;
  font-family: var(--font-en);
}
.vc .vb-freq.fb-s { color: var(--coral); background: rgba(233,69,96,0.1); }

// // еЫҐеЫҐйУЊиЈѓеҐЮеЉЇпЉЪеКЯиГљйЧідЇ§еПЙйУЊжО•
(function(){
  function doEnhanceVocab(){
    var page=document.querySelector('.page.active');
    if(!page||page.id!=='p-vocab')return;
    document.querySelectorAll('#p-vocab .vc').forEach(function(el){
      if(el.querySelector('.al-link'))return;
      var wordEl=el.querySelector('.vw');
      if(!wordEl)return;
      var wordText=wordEl.textContent.trim();
      var link=document.createElement('span');
      link.className='al-link';
      link.textContent='вЮХдїКжЧ•е§Нпњ?;
      link.style.cssText='display:inline-block;font-size:9px;color:#4ecca3;cursor:pointer;margin-left:4px;padding:0 5px;border:1px solid rgba(78,204,163,0.3);border-radius:4px;background:rgba(78,204,163,0.08);vertical-align:middle;line-height:1.6';
      link.title='е∞Жж≠§иѓНеК†еЕ•дїКжЧ•е§Нпњ?;
      link.onclick=function(e){
        e.stopPropagation();
        var w=VOCAB.find(function(v){return v.word===wordText||v.reading===wordText});
        if(w){
          var p=lp();
          if(!p[w.id])p[w.id]={id:w.id,count:0,nextDate:new Date().toISOString().split('T')[0]};
          p[w.id].nextDate=new Date().toISOString().split('T')[0];
          try{lp(p,1)}catch(e){}
          link.textContent='пњ?;
          link.style.borderColor='rgba(78,204,163,0.6)';
          link.style.color='#6ee7b7';
        }
      };
      // put link before .va-stack
      var stack=el.querySelector('.va-stack');
      if(stack)stack.parentNode.insertBefore(link,stack);
      else wordEl.parentNode.insertBefore(link,wordEl.nextSibling);
    });
  }
  function doEnhanceGrammar(){
    var page=document.querySelector('.page.active');
    if(!page||page.id!=='p-grammar')return;
    document.querySelectorAll('#p-grammar .vwb').forEach(function(el){
      if(el.querySelector('.al-quiz-link'))return;
      var title=el.querySelector('.vwb-title');
      if(!title)return;
      var link=document.createElement('span');
      link.className='al-quiz-link';
      link.textContent='рЯУЛеОїзЬЯпњ?;
      link.style.cssText='display:inline-block;font-size:10px;color:#f5a623;cursor:pointer;margin-left:6px;padding:1px 6px;border:1px solid rgba(245,166,35,0.3);border-radius:4px;background:rgba(245,166,35,0.08)';
      link.title='еОїзЬЯйҐШзЬЛзЬЛињЩдЄ™иѓ≠ж≥ХзВє';
      link.onclick=function(e){e.stopPropagation();go('quiz')};
      title.parentNode.insertBefore(link,title.nextSibling);
    });
  }
  // MutationObserverпЉИжЫњдї£иљЃиѓҐпЉМжЫійЂШпњљпњљпњљпЉЙ
  var obs=new MutationObserver(function(){
    var page=document.querySelector('.page.active');
    if(!page)return;
    if(page.id==='p-vocab')setTimeout(doEnhanceVocab,300);
    if(page.id==='p-grammar')setTimeout(doEnhanceGrammar,300);
  });
  setTimeout(function(){
    var t=document.getElementById('p-vocab')||document.getElementById('p-grammar')||document.body;
    if(t)obs.observe(t,{childList:true,subtree:true});
  },500);
})();
</script>
