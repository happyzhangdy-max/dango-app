name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/android-build.yml'
      - 'capacitor_app/**'
      - 'index.html'
      - 'data.js'
      - 'inline.js'
      - 'grammar_data.js'
      - 'quiz_data_*.js'
      - 'game/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version name (e.g. 4.0.1)'
        required: false
        default: '4.0.0'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Capacitor dependencies
        working-directory: capacitor_app
        run: npm install

      - name: Sync web files to Capacitor
        working-directory: capacitor_app
        run: |
          mkdir -p www
          cp ../index.html www/
          cp ../inline.js www/
          cp ../data.js www/
          cp ../grammar_data.js www/
          cp ../quiz_data_high.js www/
          cp ../quiz_data_normal.js www/
          cp ../favicon.svg www/ 2>/dev/null || true
          mkdir -p www/game
          cp ../game/tower-climb.js www/game/ 2>/dev/null || true
          cp ../game/boxing.js www/game/ 2>/dev/null || true
          [ -d ../assets ] && cp -r ../assets www/ 2>/dev/null || true

      - name: Patch WebView whitelist for Capacitor
        working-directory: capacitor_app
        run: python3 patch_whitelist.py

      - name: Sync to Android project
        working-directory: capacitor_app
        run: npx cap copy android

      - name: Build release APK (unsigned)
        working-directory: capacitor_app/android
        run: |
          VERSION="${{ github.event.inputs.version || '4.0.0' }}"
          sed -i "s/versionName \".*\"/versionName \"$VERSION\"/" app/build.gradle
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Build debug APK
        working-directory: capacitor_app/android
        run: |
          rm -f app/build/outputs/apk/release/app-release-unsigned.apk
          ./gradlew assembleDebug

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nihongo-corner-apk
          path: capacitor_app/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
